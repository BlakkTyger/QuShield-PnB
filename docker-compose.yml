services:
  db:
    image: postgres:15-alpine
    container_name: qushield_db
    environment:
      POSTGRES_USER: qushield
      POSTGRES_PASSWORD: changeme_local_dev
      POSTGRES_DB: qushield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qushield -d qushield"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: qushield-pnb/backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qushield_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=qushield
      - POSTGRES_PASSWORD=changeme_local_dev
      - POSTGRES_DB=qushield
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}
      - APP_ENV=production
      - LOG_LEVEL=DEBUG
      - GEOIP_DB_PATH=/app/geoip/GeoLite2-City.mmdb
      - REPORTS_DIR=/app/data/reports
      - MPLBACKEND=Agg
      - PYTHONPATH=/app
      - SECURITYTRAILS_API_KEY=${SECURITYTRAILS_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8000:8000"
    volumes:
      - qushield_chroma:/app/data/chroma
      - qushield_reports:/app/data/reports
      - qushield_data:/app/data

  frontend:
    image: qushield-pnb/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:8000
    container_name: qushield_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  qushield_data:
  qushield_chroma:
  qushield_reports:
