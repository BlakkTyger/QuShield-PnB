version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qushield_db
    environment:
      POSTGRES_USER: qushield
      POSTGRES_PASSWORD: changeme_local_dev
      POSTGRES_DB: qushield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qushield -d qushield"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: qushield_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Note: GPU support can be enabled here if the host has NVIDIA drivers/container toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: curlimages/curl:latest
    container_name: qushield_ollama_init
    depends_on:
      - ollama
    volumes:
      - ./backend/scripts/init_ollama.sh:/init_ollama.sh
    entrypoint: ["/bin/sh", "/init_ollama.sh"]
    environment:
      - OLLAMA_HOST=ollama

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qushield_backend
    depends_on:
      db:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=qushield
      - POSTGRES_PASSWORD=changeme_local_dev
      - POSTGRES_DB=qushield
      - OLLAMA_BASE_URL=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_ENV=production
      - LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"
    volumes:
      - qushield_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qushield_frontend
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  qushield_data:
  ollama_data:
